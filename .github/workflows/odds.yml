name: Refresh odds & site

# Refresh every 3 hours: re-scrape confirmed team lists and re-predict the round
# (so a lineup change flows into the predictions), then re-fetch Sportsbet +
# Ladbrokes odds, re-price, and rebuild the site. Odds and lineups move fast; the
# full model (ingest/train/calibrate) is rebuilt separately by model.yml once a day.

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nrl-publish        # shared with model.yml so commits never race
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # Re-scrape confirmed team lists and re-predict the round. This is what
      # makes a lineup change (e.g. a late positional swap) flow through into the
      # predictions every 3h instead of waiting for the daily model.yml run.
      # Non-fatal: if the team-list source hiccups, pricing still runs against the
      # most recently committed predictions.
      - name: Re-scrape confirmed team lists + re-predict the round
        run: python src/run_round.py
        continue-on-error: true

      - name: Fetch Sportsbet, Ladbrokes, TAB, PointsBet (+ Dabble) odds
        run: python src/odds.py
        env:
          DABBLE_COOKIE: ${{ secrets.DABBLE_COOKIE }}
          TAB_ACCESS_TOKEN: ${{ secrets.TAB_ACCESS_TOKEN }}
          TAB_CLIENT_ID: ${{ secrets.TAB_CLIENT_ID }}
          TAB_CLIENT_SECRET: ${{ secrets.TAB_CLIENT_SECRET }}

      - name: Price stat markets + compute edges
        run: python src/pricing.py price

      - name: Price try-scorer markets
        run: python src/pricing.py tries

      - name: Price player-points + goals markets
        run: python src/player_points.py price

      - name: Price Dabble Pick'em (model vs line)
        run: python src/pickem.py

      - name: Build odds-comparison dashboard data
        run: python src/compare.py

      - name: Export JSON bundle for nrl24-0.com
        run: python src/export_site_data.py
        continue-on-error: true

      - name: Build site
        run: python src/build_site.py

      - name: Commit lineups, predictions, odds + site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # `data` captures refreshed lineups/predictions from run_round.py; models
          # are untouched here (training stays in the daily model.yml).
          git add -A data reports docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Refresh lineups, predictions, odds + site [skip ci]"

          # Push with rebase-retry: regenerated artifacts always win on conflict.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — rebasing onto latest main..."
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; exit 1; }
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1

      - name: Trigger nrl24-0.com redeploy (fresh model data)
        if: ${{ env.NRL240_DISPATCH_TOKEN != '' }}
        env:
          NRL240_DISPATCH_TOKEN: ${{ secrets.NRL240_DISPATCH_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $NRL240_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DanielTomaro13/NRL-24-0/dispatches \
            -d '{"event_type":"model-data-updated"}' \
            && echo "Dispatched model-data-updated to NRL-24-0" || echo "Dispatch skipped/failed"
