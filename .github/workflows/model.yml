name: Daily model pipeline

# Model brain, once a day: ingest new results -> features -> train + calibrate ->
# scrape confirmed team lists -> predict the round. Commits the refreshed model and
# predictions. Odds/pricing/site/redeploy are NOT here — the AU books (Sportsbet/TAB)
# geo-block GitHub's US runners, so those run from a local AU cron (scripts/odds-cron.sh).

on:
  schedule:
    - cron: "0 19 * * *"   # 05:00 AEST daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nrl-publish      # shared with odds.yml so commits never race
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: chmod +x scripts/run_track.sh

      # Men's NRL: full train + predict (same stages as before). The site bundle is
      # left to the local AU odds cron, which prices these predictions against the
      # live books and rebuilds the men's bundle.
      - name: "NRL — ingest, train, predict"
        run: scripts/run_track.sh nrl

      # NRLW: own trained models + match-outcome markets + site bundle exported here
      # in CI (no AU-book odds needed for the model/projection pages).
      - name: "NRLW — train, predict, match markets, export"
        run: scripts/run_track.sh nrlw

      # State of Origin reuses the club models, so it MUST run after nrl/nrlw which
      # produce those models on disk in the steps above.
      - name: "State of Origin (men's) — predict + export"
        run: scripts/run_track.sh soo

      - name: "State of Origin (women's) — predict + export"
        run: scripts/run_track.sh soow

      # Men's odds, pricing and the nrl24-0.com redeploy are intentionally NOT run
      # here. The AU books (Sportsbet/TAB) geo-block GitHub's US runners, so the
      # men's odds→price→site→redeploy pipeline runs from a local AU cron every 3h
      # (scripts/odds-cron.sh, all five books fresh). NRLW/Origin have their bundles
      # exported above; the next cron run prices men's and rebuilds its site.
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data models reports
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily model run: predictions [skip ci]"

          # Push with rebase-retry: regenerated artifacts always win on conflict.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — rebasing onto latest main..."
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; exit 1; }
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1

      # Rebuild nrl24-0.com so the freshly-committed NRLW + Origin bundles go live.
      # (Men's odds/site are handled separately by the AU cron's own dispatch.)
      - name: Trigger nrl24-0.com redeploy
        env:
          NRL240_DISPATCH_TOKEN: ${{ secrets.NRL240_DISPATCH_TOKEN }}
        run: |
          if [ -z "${NRL240_DISPATCH_TOKEN}" ]; then
            echo "No NRL240_DISPATCH_TOKEN secret; skipping redeploy."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $NRL240_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DanielTomaro13/NRL-24-0/dispatches \
            -d '{"event_type":"model-data-updated"}' \
            && echo "Dispatched model-data-updated to NRL-24-0"
