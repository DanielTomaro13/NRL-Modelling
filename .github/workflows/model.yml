name: Daily model pipeline

# Model brain, once a day: ingest new results -> features -> train + calibrate ->
# scrape confirmed team lists -> predict the round. Commits the refreshed model and
# predictions. Odds/pricing/site/redeploy are NOT here — the AU books (Sportsbet/TAB)
# geo-block GitHub's US runners, so those run from a local AU cron (scripts/odds-cron.sh).

on:
  schedule:
    - cron: "0 19 * * *"   # 05:00 AEST daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nrl-publish      # shared with odds.yml so commits never race
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ingest Champion Data feeds (incremental — cached matches reused)
        run: python src/ingest.py

      - name: Build features
        run: python src/features.py

      - name: Train models + calibrate dispersion
        run: python src/train.py

      - name: Scrape team lists + predict the round
        run: python src/run_round.py

      - name: Champion Data analysis + backtest + feature importance
        run: python src/analysis.py

      - name: Train try-scorer model + backtest + predict
        run: python src/tryscorer.py

      - name: Train goal-kicking model + backtest + predict
        run: python src/kicker.py

      - name: Player-points model (try + kicker) + backtest + predict
        run: python src/player_points.py

      # Odds, pricing, the site bundle and the nrl24-0.com redeploy are intentionally
      # NOT run here. The AU books (Sportsbet/TAB) geo-block GitHub's US runners, so
      # the odds→price→site→redeploy pipeline runs from a local AU cron every 3h
      # (scripts/odds-cron.sh, all five books fresh). This job only updates the model
      # and predictions; the next cron run prices them and rebuilds the site.
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data models reports
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily model run: predictions [skip ci]"

          # Push with rebase-retry: regenerated artifacts always win on conflict.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push rejected (attempt $i) — rebasing onto latest main..."
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; exit 1; }
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1
