name: Daily model pipeline

# Full pipeline once a day: ingest new results -> features -> train + calibrate
# -> scrape confirmed team lists -> predict the round -> fetch odds -> price
# -> rebuild the GitHub Pages site. Commits the refreshed model, predictions and site.

on:
  schedule:
    - cron: "0 19 * * *"   # 05:00 AEST daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nrl-publish      # shared with odds.yml so commits never race
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ingest Champion Data feeds (incremental — cached matches reused)
        run: python src/ingest.py

      - name: Build features
        run: python src/features.py

      - name: Train models + calibrate dispersion
        run: python src/train.py

      - name: Scrape team lists + predict the round
        run: python src/run_round.py

      - name: Champion Data analysis + backtest + feature importance
        run: python src/analysis.py

      - name: Train try-scorer model + backtest + predict
        run: python src/tryscorer.py

      - name: Train goal-kicking model + backtest + predict
        run: python src/kicker.py

      - name: Player-points model (try + kicker) + backtest + predict
        run: python src/player_points.py

      - name: Fetch Sportsbet, Ladbrokes, TAB, PointsBet (+ Dabble) odds
        run: python src/odds.py
        continue-on-error: true
        env:
          DABBLE_COOKIE: ${{ secrets.DABBLE_COOKIE }}
          TAB_ACCESS_TOKEN: ${{ secrets.TAB_ACCESS_TOKEN }}
          TAB_CLIENT_ID: ${{ secrets.TAB_CLIENT_ID }}
          TAB_CLIENT_SECRET: ${{ secrets.TAB_CLIENT_SECRET }}

      - name: Price stat markets + compute edges
        run: python src/pricing.py price
        continue-on-error: true

      - name: Price try-scorer markets
        run: python src/pricing.py tries
        continue-on-error: true

      - name: Price player-points + goals markets
        run: python src/player_points.py price
        continue-on-error: true

      - name: Price Dabble Pick'em (model vs line)
        run: python src/pickem.py
        continue-on-error: true

      - name: Build odds-comparison dashboard data
        run: python src/compare.py
        continue-on-error: true

      - name: Export JSON bundle for nrl24-0.com
        run: python src/export_site_data.py
        continue-on-error: true

      - name: Build site
        run: python src/build_site.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data models reports docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily model run: predictions, odds, site [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi

      - name: Trigger nrl24-0.com redeploy (fresh model data)
        if: ${{ env.NRL240_DISPATCH_TOKEN != '' }}
        env:
          NRL240_DISPATCH_TOKEN: ${{ secrets.NRL240_DISPATCH_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $NRL240_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DanielTomaro13/NRL-24-0/dispatches \
            -d '{"event_type":"model-data-updated"}' \
            && echo "Dispatched model-data-updated to NRL-24-0" || echo "Dispatch skipped/failed"
